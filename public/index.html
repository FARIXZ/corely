<!doctype html>
<html lang="en" style="color-scheme: dark">
  <head>
    <meta charset="UTF-8" />
    <title>Corely Actions Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="/feather.min.js"></script>
    <style>
      :root {
        --bg: #0d0d12;
        --surface: rgba(255, 255, 255, 0.05);
        --surface-hover: rgba(255, 255, 255, 0.08);
        --border: rgba(255, 255, 255, 0.1);
        --brand: hsl(270, 100%, 65%);
        --brand-glow: hsla(270, 100%, 65%, 0.4);
        --danger: hsl(0, 100%, 65%);
        --text: #ffffff;
        --text-muted: rgba(255, 255, 255, 0.6);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
        background-image:
          radial-gradient(circle at 15% 50%, hsla(270, 100%, 65%, 0.08), transparent 25%),
          radial-gradient(circle at 85% 30%, hsla(210, 100%, 65%, 0.08), transparent 25%);
      }

      .container {
        width: 100%;
        max-width: 600px;
        display: flex;
        flex-direction: column;
        gap: 30px;
      }

      .header {
        text-align: center;
        margin-bottom: 10px;
      }

      .header h1 {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 8px;
      }

      .header p {
        color: var(--text-muted);
        font-size: 15px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
      }

      .form-group {
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        position: relative;
      }

      label {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      input,
      select {
        width: 100%;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 15px;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }

      select {
        appearance: none;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: var(--brand);
        box-shadow: 0 0 0 3px hsla(270, 100%, 65%, 0.2);
      }

      /* Custom Icon Dropdown/Search */
      .icon-selector {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .icon-preview {
        width: 44px;
        height: 44px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: var(--text);
      }

      .btn {
        background: var(--brand);
        color: #fff;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
      }

      .btn:hover {
        background: hsl(270, 100%, 70%);
        box-shadow: 0 0 16px var(--brand-glow);
      }

      .btn:active {
        transform: scale(0.98);
      }

      .btn-danger {
        background: transparent;
        color: var(--danger);
        width: auto;
        padding: 8px;
      }

      .btn-danger:hover {
        background: hsla(0, 100%, 65%, 0.1);
        box-shadow: none;
      }

      .actions-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .action-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--border);
        border-radius: 8px;
      }

      .action-info {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .action-info .icon {
        color: var(--brand);
        background: var(--surface);
        padding: 8px;
        border-radius: 6px;
        display: flex;
      }

      .action-details {
        display: flex;
        flex-direction: column;
      }

      .action-details str {
        font-weight: 600;
        font-size: 15px;
      }

      .action-details sm {
        color: var(--text-muted);
        font-size: 12px;
        font-family: monospace;
        margin-top: 2px;
      }

      .badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.1);
        font-size: 12px;
        font-weight: 600;
      }

      /* Autocomplete Dropdown */
      .autocomplete-dropdown {
        position: absolute;
        top: 100%;
        left: 56px;
        right: 0;
        margin-top: 8px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        max-height: 240px;
        overflow-y: auto;
        display: none;
        z-index: 10;
        flex-direction: column;
      }
      
      .dropdown-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 16px;
        cursor: pointer;
        transition: background 0.2s;
        color: var(--text);
        font-size: 14px;
      }
      
      .dropdown-item:hover {
        background: var(--surface-hover);
      }
      
      /* Datalist styling hack fallback */
      datalist {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header" style="position: relative;">
        <h1>Corely Actions</h1>
        <p>Create and manage system execution shortcuts</p>
        <div style="position: absolute; top: 0; right: 0; display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.2); padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);">
           <div style="display: flex; gap: 8px; align-items: center; border-right: 1px solid var(--border); padding-right: 12px;">
             <i data-feather="list" id="viewList" style="width:16px; height: 16px; cursor:pointer; color: var(--brand); transition: 0.2s;" title="List View"></i>
             <i data-feather="grid" id="viewGrid" style="width:16px; height: 16px; cursor:pointer; color: var(--text-muted); transition: 0.2s;" title="Grid View"></i>
           </div>
           
           <div style="display: flex; align-items: center; gap: 6px;" title="Accent Color">
             <label for="accentPicker" style="cursor: pointer; display: flex; align-items: center;">
               <i data-feather="droplet" style="width:16px; height: 16px; color: var(--text-muted);"></i>
             </label>
             <input type="color" id="accentPicker" value="#a266ff" style="width: 24px; height: 24px; padding: 0; border: none; border-radius: 4px; cursor: pointer; background: transparent;">
           </div>
        </div>
      </div>

      <div class="card">
        <form id="createForm">
          <div class="form-group">
            <label>Action Name</label>
            <input type="text" id="actionName" placeholder="e.g. Screen On" required autocomplete="off" />
          </div>

          <div class="form-group">
            <label>Icon Identifier</label>
            <div class="icon-selector" style="position: relative;">
              <div class="icon-preview" id="iconPreview">
                <!-- preview injected here -->
              </div>
              <input
                type="text"
                id="actionIcon"
                placeholder="Type to search Lucide icons..."
                value=""
                required
                autocomplete="off"
              />
              <div class="autocomplete-dropdown" id="iconDropdown"></div>
            </div>
            <small style="color: var(--text-muted); font-size: 11px; margin-top: 4px">Supports all Lucide Icons. Must have internet for preview.</small>
          </div>

          <div class="form-group">
            <label>System Command</label>
            <input type="text" id="actionCommand" placeholder="e.g. /usr/sbin/vbetool dpms on" required autocomplete="off" />
          </div>

          <button type="submit" class="btn">
            <i data-feather="plus" style="width: 18px; height: 18px"></i>
            Create Action
          </button>
        </form>
      </div>

      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px">
          <h2 style="font-size: 18px; font-weight: 600">Active Actions</h2>
          <span class="badge" id="actionCount">0</span>
        </div>
        <div class="actions-list" id="actionsList">
          <!-- Actions rendered here -->
        </div>
      </div>
    </div>

    <script>
      feather.replace();

      // DOM Elements
      const form = document.getElementById('createForm');
      const nameInput = document.getElementById('actionName');
      const iconInput = document.getElementById('actionIcon');
      const commandInput = document.getElementById('actionCommand');
      const iconPreview = document.getElementById('iconPreview');
      const actionsList = document.getElementById('actionsList');
      const actionCount = document.getElementById('actionCount');
      const accentPicker = document.getElementById('accentPicker');
      const viewListBtn = document.getElementById('viewList');
      const viewGridBtn = document.getElementById('viewGrid');
      
      let currentViewMode = 'list';

      function applyViewMode(mode) {
         currentViewMode = mode;
         if (mode === 'grid') {
            viewGridBtn.style.color = 'var(--brand)';
            viewListBtn.style.color = 'var(--text-muted)';
         } else {
            viewListBtn.style.color = 'var(--brand)';
            viewGridBtn.style.color = 'var(--text-muted)';
         }
      }

      async function saveSetting(key, value) {
         try {
           await fetch('/api/settings', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ [key]: value })
           });
         } catch(err) { console.error(err); }
      }

      viewListBtn.addEventListener('click', () => { applyViewMode('list'); saveSetting('viewMode', 'list'); });
      viewGridBtn.addEventListener('click', () => { applyViewMode('grid'); saveSetting('viewMode', 'grid'); });

      // Setup dynamic Settings UI
      async function setupSettings() {
         try {
           const res = await fetch('/api/settings');
           const data = await res.json();
           if (data.accentColor) {
             accentPicker.value = data.accentColor;
             applyAccentColor(data.accentColor);
           }
           if (data.viewMode) {
             applyViewMode(data.viewMode);
           }
         } catch(e) {}
      }

      function applyAccentColor(hex) {
         document.documentElement.style.setProperty('--brand', hex);
         document.documentElement.style.setProperty('--brand-glow', hex + '66');
         document.body.style.backgroundImage = `
           radial-gradient(circle at 15% 50%, ${hex}14, transparent 25%),
           radial-gradient(circle at 85% 30%, ${hex}14, transparent 25%)
         `;
      }

      accentPicker.addEventListener('change', (e) => {
         const hex = e.target.value;
         applyAccentColor(hex);
         saveSetting('accentColor', hex);
      });
      
      setupSettings();

      let currentIconSvg = '';
      let fetchTimeout;
      let allIcons = [];
      const dropdown = document.getElementById('iconDropdown');

      // Fetch the library registry on load (via same-origin backend proxy to beat CORS)
      fetch('/api/icons/meta')
        .then(res => res.json())
        .then(data => {
            if (data && data.files) {
               allIcons = data.files.map(f => f.path.replace('/icons/', '').replace('.svg', ''));
            }
        })
        .catch(e => console.error("Could not fetch icon list", e));

      iconInput.addEventListener('focus', handleSearch);
      iconInput.addEventListener('input', handleSearch);
      
      // hide dropdown when clicking outside
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.icon-selector')) {
           dropdown.style.display = 'none';
        }
      });
      
      let searchTimeout;
      function handleSearch() {
        clearTimeout(searchTimeout);
        const val = iconInput.value.toLowerCase().trim();
        if (!val || allIcons.length === 0) {
           dropdown.style.display = 'none';
           return;
        }

        searchTimeout = setTimeout(() => {
          // Limit to 20 to prevent DOM/network overload
          const matches = allIcons.filter(name => name.includes(val)).slice(0, 20);
          
          if (matches.length === 0) {
             dropdown.innerHTML = '<div style="padding: 16px; text-align: center; color: var(--text-muted); font-size: 13px;">No icons found</div>';
             dropdown.style.display = 'flex';
             return;
          }
          
          dropdown.innerHTML = '';
          matches.forEach(name => {
             const div = document.createElement('div');
             div.className = 'dropdown-item';
             div.innerHTML = `<span style="opacity: 0.5; width: 18px; height: 18px; display: inline-block;"></span><span>${name}</span>`;
             div.onclick = () => selectIcon(name);
             dropdown.appendChild(div);
             
             fetch(`https://unpkg.com/lucide-static@latest/icons/${name}.svg`)
               .then(r => r.text())
               .then(svg => {
                  div.children[0].outerHTML = svg;
                  const svgEl = div.querySelector('svg');
                  if (svgEl) {
                     svgEl.style.width = '18px';
                     svgEl.style.height = '18px';
                     svgEl.style.color = 'var(--brand)';
                  }
               });
          });
          
          dropdown.style.display = 'flex';
        }, 150);
      }

      async function selectIcon(name) {
         iconInput.value = name;
         dropdown.style.display = 'none';
         
         iconPreview.innerHTML = '<i data-feather="clock"></i>';
         try { feather.replace(); } catch(e) {}
         
         try {
            const res = await fetch('https://unpkg.com/lucide-static@latest/icons/' + name + '.svg');
            if (res.ok) {
               const svg = await res.text();
               iconPreview.innerHTML = svg;
               const svgEl = iconPreview.querySelector('svg');
               if (svgEl) {
                 svgEl.style.width = '24px';
                 svgEl.style.height = '24px';
               }
               currentIconSvg = svg;
            } else {
               iconPreview.innerHTML = '<i data-feather="help-circle"></i>';
               try { feather.replace(); } catch(e) {}
               currentIconSvg = '';
            }
         } catch(e) {}
      }

      // Initial fetch of actions
      async function loadActions() {
        try {
          const res = await fetch('/api/actions');
          const actions = await res.json();
          renderActions(actions);
        } catch (err) {
          console.error('Failed to load actions:', err);
        }
      }

      function renderActions(actions) {
        actionsList.innerHTML = '';
        actionCount.innerText = actions.length;

        if (actions.length === 0) {
          actionsList.innerHTML = '<div style="text-align: center; color: var(--text-muted); font-size: 14px; padding: 20px 0;">No actions created yet.</div>';
          return;
        }

        actions.forEach(action => {
          const item = document.createElement('div');
          item.className = 'action-item';

          item.innerHTML = `
            <div class="action-info">
              <div class="icon" id="list-icon-${action.id}">
                <!-- Icon loads offline via backend -->
              </div>
              <div class="action-details">
                <str>${action.name}</str>
                <sm>${action.command}</sm>
              </div>
            </div>
            <button class="btn btn-danger" onclick="deleteAction('${action.id}')" title="Delete">
              <i data-feather="trash-2" style="width: 18px; height: 18px;"></i>
            </button>
          `;
          actionsList.appendChild(item);

          // Fetch offline icon safely
          fetch(`/cached-icons/${action.icon}.svg`)
             .then(r => r.text())
             .then(svg => {
                const iconWrap = document.getElementById(`list-icon-${action.id}`);
                if (iconWrap) {
                   iconWrap.innerHTML = svg;
                   const svgEl = iconWrap.querySelector('svg');
                   if (svgEl) {
                     svgEl.style.width = '20px';
                     svgEl.style.height = '20px';
                   }
                }
             })
             .catch(e => console.error("Cached icon error", e));
        });

        feather.replace();
      }

      // Submit handler
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        if (!currentIconSvg) {
          alert("Please enter a valid Lucide icon name and wait for the preview to load.");
          return;
        }

        const payload = {
          name: nameInput.value.trim(),
          icon: iconInput.value.trim(),
          iconSvg: currentIconSvg,
          command: commandInput.value.trim()
        };

        try {
          const res = await fetch('/api/actions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (res.ok) {
            form.reset();
            iconInput.value = 'monitor';
            iconPreview.innerHTML = '<i data-feather="monitor"></i>';
            feather.replace();
            loadActions();
          } else {
            const err = await res.json();
            alert(err.error || 'Failed to create action');
          }
        } catch (error) {
          console.error(error);
          alert('Exception creating action');
        }
      });

      // Delete handler
      window.deleteAction = async (id) => {
        if (!confirm('Are you sure you want to delete this action?')) return;
        try {
          const res = await fetch(`/api/actions/${id}`, { method: 'DELETE' });
          if (res.ok) {
            loadActions();
          } else {
            alert('Failed to delete action');
          }
        } catch (err) {
          console.error(err);
        }
      };

      // Load on start
      loadActions();

      // Trigger preview for initial value
      iconInput.dispatchEvent(new Event('input'));
    </script>
  </body>
</html>
